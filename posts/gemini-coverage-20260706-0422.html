    <h1>마포 셔츠룸이 선보이는 편안하고 트렌디한 쇼핑 공간</h1>

    <p>바니와 바지, 그리고 트렌디한 액세서리까지 원스톱으로 제공하며, 고객 맞춤형 스타일링 서비스도 함께한다.</p>
    <p>자연스러운 분위기 속에서 잠깐 머무를 수 있는 장소는 <a class="anchor-link" href="https://ganseoroom.dothome.co.kr/" data-bpaas-link-target="ganseoroom">마포/합정 인디 소셜 라운지 가이드</a>를 한눈에 확인할 수 있도록 설계됐다.</p>
    <p>이런 환경 속에서 최신 트렌드를 감각적으로 체험하고 싶다면, 마포 셔츠룸을 꼭 방문해 보길 바란다</p>
